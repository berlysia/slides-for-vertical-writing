name: Deploy Cloudflare Worker (Staging)

on:
  push:
    branches: [ develop, feature/* ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# 最小権限の設定
permissions:
  contents: read
  id-token: write
  pull-requests: read

# 並行実行制御 - staging環境も1つのデプロイのみ許可
concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging-slides-berlysia-net.berlysia.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1 (SHA固定)

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # v4最新版
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4 (SHA固定)
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build slides
        run: pnpm run build:all

      - name: Copy demos into pages
        run: pnpm run copy:demos

      - name: Deploy to Cloudflare Workers (Staging)
        uses: cloudflare/wrangler-action@9681c2997648301493e78cacbfb790a9f19c833f # v3.9.0 (SHA固定)
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
          workingDirectory: '.'
        env:
          WRANGLER_LOG_LEVEL: warn

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Staging deployment successful"
            echo "🌐 URL: https://staging-slides-berlysia-net.berlysia.workers.dev"
          else
            echo "❌ Staging deployment failed"
            exit 1
          fi

      - name: Comment PR with deployment info
        if: github.event_name == 'pull_request' && job.status == 'success'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Staging deployment successful!\n\n📍 Preview URL: https://staging-slides-berlysia-net.berlysia.workers.dev'
            })