name: Deploy Cloudflare Worker

on:
  push:
    branches: [ master ]
  workflow_dispatch:

# 最小権限の設定
permissions:
  contents: read
  id-token: write

# 並行実行制御 - 1つのデプロイのみ許可、実行中のものは完了まで待機
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://slides.berlysia.net
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1 (SHA固定)

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # v4最新版
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4 (SHA固定)
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build slides
        run: pnpm run build:all

      - name: Copy demos into pages
        run: pnpm run copy:demos

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@9681c2997648301493e78cacbfb790a9f19c833f # v3.9.0 (SHA固定)
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: '.'
        env:
          # セキュリティ強化のため、ワーカーの詳細ログを無効化
          WRANGLER_LOG_LEVEL: warn

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment successful"
          else
            echo "❌ Production deployment failed"
            exit 1
          fi