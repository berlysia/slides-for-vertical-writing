<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e44"/>
    </marker>
  </defs>

  <!-- 右側：既存モデル（有限領域の分割） -->
  <g transform="translate(390, 10)">
    <text x="140" y="16" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">既存モデル</text>
    <text x="140" y="36" text-anchor="middle" font-size="12" fill="#666">有限なコンテナを段に分割する</text>

    <!-- コンテナ枠（実線＝有限、固定サイズ） -->
    <rect x="10" y="50" width="260" height="320" rx="6" fill="#f8f8f8" stroke="#333" stroke-width="2"/>

    <!-- 段1 -->
    <g transform="translate(30, 70)">
      <line x1="220" y1="0" x2="220" y2="130" stroke="#aaa" stroke-width="2"/>
      <line x1="202" y1="0" x2="202" y2="130" stroke="#aaa" stroke-width="2"/>
      <line x1="184" y1="0" x2="184" y2="130" stroke="#aaa" stroke-width="2"/>
      <line x1="166" y1="0" x2="166" y2="130" stroke="#aaa" stroke-width="2"/>
      <line x1="148" y1="0" x2="148" y2="130" stroke="#aaa" stroke-width="2"/>
      <line x1="130" y1="-6" x2="130" y2="136" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
      <line x1="112" y1="0" x2="112" y2="130" stroke="#aaa" stroke-width="2"/>
      <line x1="94" y1="0" x2="94" y2="130" stroke="#aaa" stroke-width="2"/>
      <line x1="76" y1="0" x2="76" y2="130" stroke="#aaa" stroke-width="2"/>
      <line x1="58" y1="0" x2="58" y2="130" stroke="#aaa" stroke-width="2"/>
      <line x1="40" y1="0" x2="40" y2="130" stroke="#aaa" stroke-width="2"/>
    </g>

    <!-- 折り返し矢印 -->
    <path d="M 50,206 L 50,218 L 260,218 L 260,232" fill="none" stroke="#e44" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- 段3-4 -->
    <g transform="translate(30, 240)">
      <line x1="220" y1="0" x2="220" y2="110" stroke="#aaa" stroke-width="2"/>
      <line x1="202" y1="0" x2="202" y2="110" stroke="#aaa" stroke-width="2"/>
      <line x1="184" y1="0" x2="184" y2="110" stroke="#aaa" stroke-width="2"/>
      <line x1="166" y1="0" x2="166" y2="110" stroke="#aaa" stroke-width="2"/>
      <line x1="148" y1="0" x2="148" y2="110" stroke="#aaa" stroke-width="2"/>
      <line x1="130" y1="-6" x2="130" y2="116" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
      <line x1="112" y1="0" x2="112" y2="110" stroke="#aaa" stroke-width="2"/>
      <line x1="94" y1="0" x2="94" y2="60" stroke="#aaa" stroke-width="2"/>
    </g>

    <!-- コンテナサイズ注記 -->
    <text x="290" y="210" font-size="11" fill="#666" transform="rotate(90, 290, 210)">コンテナサイズ（固定）</text>
  </g>

  <!-- 左側：欲しいモデル（無限方向に積む） -->
  <g transform="translate(30, 10)">
    <text x="140" y="16" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">欲しいモデル</text>
    <text x="140" y="36" text-anchor="middle" font-size="12" fill="#666">無限の領域に段を積んでいく</text>

    <!-- 包含ブロック（成り行きで伸びる＝下辺が破線） -->
    <rect x="0" y="44" width="280" height="0" rx="6" fill="none" stroke="none"/>
    <line x1="0" y1="44" x2="280" y2="44" stroke="#07a" stroke-width="2"/>
    <line x1="0" y1="44" x2="0" y2="390" stroke="#07a" stroke-width="2"/>
    <line x1="280" y1="44" x2="280" y2="390" stroke="#07a" stroke-width="2"/>
    <line x1="0" y1="390" x2="280" y2="390" stroke="#07a" stroke-width="2" stroke-dasharray="6 4"/>
    <!-- 包含ブロック注記 -->
    <text x="296" y="220" font-size="11" fill="#07a" transform="rotate(90, 296, 220)">包含ブロック（成り行きで広がる）</text>

    <!-- 段1 -->
    <rect x="10" y="50" width="260" height="100" rx="4" fill="none" stroke="#333" stroke-width="1.5"/>
    <g transform="translate(30, 62)">
      <line x1="220" y1="0" x2="220" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="202" y1="0" x2="202" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="184" y1="0" x2="184" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="166" y1="0" x2="166" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="130" y1="-4" x2="130" y2="78" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
      <line x1="112" y1="0" x2="112" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="94" y1="0" x2="94" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="76" y1="0" x2="76" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="58" y1="0" x2="58" y2="74" stroke="#aaa" stroke-width="2"/>
    </g>
    <!-- 折り返し矢印 -->
    <path d="M 50,146 L 50,158 L 260,158 L 260,172" fill="none" stroke="#e44" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- 段2 -->
    <rect x="10" y="170" width="260" height="100" rx="4" fill="none" stroke="#333" stroke-width="1.5"/>
    <g transform="translate(30, 182)">
      <line x1="220" y1="0" x2="220" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="202" y1="0" x2="202" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="184" y1="0" x2="184" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="166" y1="0" x2="166" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="130" y1="-4" x2="130" y2="78" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
      <line x1="112" y1="0" x2="112" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="94" y1="0" x2="94" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="76" y1="0" x2="76" y2="74" stroke="#aaa" stroke-width="2"/>
      <line x1="58" y1="0" x2="58" y2="74" stroke="#aaa" stroke-width="2"/>
    </g>
    <!-- 折り返し矢印 -->
    <path d="M 50,266 L 50,278 L 260,278 L 260,292" fill="none" stroke="#e44" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- 段3（途中まで） -->
    <rect x="10" y="290" width="260" height="80" rx="4" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="none"/>
    <g transform="translate(30, 302)">
      <line x1="220" y1="0" x2="220" y2="50" stroke="#aaa" stroke-width="2"/>
      <line x1="202" y1="0" x2="202" y2="50" stroke="#aaa" stroke-width="2"/>
      <line x1="184" y1="0" x2="184" y2="30" stroke="#aaa" stroke-width="2"/>
    </g>

    <!-- 省略記号（縦の点3つ） -->
    <text x="140" y="400" text-anchor="middle" font-size="18" fill="#666">⋮</text>
  </g>
</svg>
